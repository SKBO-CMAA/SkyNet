<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Portal de Datos de Estaciones de Calidad de Aire</title>

<style>

body{
font-family:Arial;
margin:20px;
background:#f4f6f8;
background-image: url('ca.jpeg');
/*background-size: cover;*/
background-position: center;
background-attachment:fixed;
background-repeat: no-repeat;
}

h1{
text-align:center;
color:white;
margin-bottom:20px;
}

#ruta{
max-width:650px;
margin:auto;
margin-bottom:10px;
color:white;
font-size:16px;
}

#explorador{

max-width:600px;
margin:auto;

/*background:white;*/
background:rgba(255,255,255,0.55);

border-radius:10px;

box-shadow:0 4px 20px rgba(0,0,0,0.25);

backdrop-filter:blur(4px);

overflow:hidden;

}

.item{

display:flex;

justify-content:space-between;

padding:12px 15px;

border-bottom:1px solid #eee;

cursor:pointer;

}

.item:hover{
background:rgba(255,255,255,0.25);
filter:brightness(0.95);
}

.icono{
margin-right:10px;
}

.nombre{
flex:1;
}

.descargar{

text-decoration:none;
color:#007BFF;
font-size:13px;
}

.visor{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.visor-contenido{
width:95%;
height:95%;
background:white;
border-radius:10px;
overflow:hidden;
position:relative;
}

#frame{
width:100%;
height:100%;
border:none;
}

#cerrarVisor{

position:fixed;

top:20px;
right:25px;

width:42px;
height:42px;

display:flex;
align-items:center;
justify-content:center;

background:rgba(0,0,0,0.75);
color:white;

border-radius:50%;

font-size:22px;
font-weight:bold;

cursor:pointer;

z-index:2000;

box-shadow:0 3px 10px rgba(0,0,0,0.4);

}

</style>

</head>

<body>

<h1>Portal de Datos de Estaciones de Calidad de Aire</h1>

<div id="ruta"></div>

<div id="explorador"></div>
<div id="visor" class="visor">
  <div class="visor-contenido">

    <span id="cerrarVisor">✖</span>

    <div class="visor-contenido">
      <iframe id="frame"></iframe>
    </div>

  </div>
</div>

<script>

let raiz
let historial=[]
let colorActual = "#333"

const colores = {

"CA1 Engativa":"rgb(47,85,151)",
"CA2 CNA":"rgb(237,125,49)",
"CA3 Fontibón":"rgb(84,130,53)",
/*"Certificados meteorologia":"rgb(5,5,5)",*/
/*"Certificados tetracal":"rgb(5,5,5)",*/
"CA4 Funza":"rgb(158,228,245)"

}

fetch("estructura_estaciones.json")

.then(r=>r.json())

.then(data=>{

raiz=data

mostrar(data)

})

function mostrar(carpeta){

const cont=document.getElementById("explorador")

const ruta=document.getElementById("ruta")

cont.innerHTML=""

ruta.innerText="Ruta: "+historial.map(x=>x.nombre).join(" / ")

if(historial.length>0){

const volver=document.createElement("div")

volver.className="item"

volver.innerHTML="⬅ Volver"

volver.onclick=()=>{

historial.pop()

if(historial.length===0){
    colorActual="#333"
}

let destino=raiz

historial.forEach(p=>{
destino=p
})

mostrar(destino)

}

cont.appendChild(volver)

}

carpeta.contenido.forEach(e=>{

const fila=document.createElement("div")

fila.className="item"

if(e.tipo==="carpeta"){

let color = colores[e.nombre] || colorActual

fila.innerHTML=`
<span class="icono" >📁</span>
<span class="nombre" style="color:${color}; font-weight:bold;">${e.nombre}</span>
`
if(colores[e.nombre]){
/*fila.style.backgroundColor=colores[e.nombre]
fila.style.color="white"
/*fila.style.color=colores[e.nombre]*/
}

fila.onclick=()=>{

historial.push(e)
if(colores[e.nombre]){
    colorActual = colores[e.nombre]
}
mostrar(e)

}

}
/*if(e.tipo==="carpeta"){

fila.innerHTML=`
<span class="icono">📁</span>
<span class="nombre">${e.nombre}</span>
`

if(colores[e.nombre]){
fila.style.backgroundColor=colores[e.nombre]
fila.style.color="white"
}

fila.onclick=()=>{

historial.push(e)

mostrar(e)

}*/else{

fila.innerHTML=`
<span class="icono">📄</span>
<span class="nombre archivo" data-ruta="${e.ruta}">${e.nombre}</span>

<a class="descargar" href="${e.ruta}" download>
Descargar
</a>
`

}

cont.appendChild(fila)

// activar visor solo para archivos
const archivo = fila.querySelector(".archivo")

if(archivo){

archivo.onclick=(ev)=>{

ev.stopPropagation()

const ruta=archivo.dataset.ruta

document.getElementById("frame").src=ruta

document.getElementById("visor").style.display="flex"

}

}

}
)

}
document.getElementById("cerrarVisor").onclick=()=>{

document.getElementById("visor").style.display="none"

document.getElementById("frame").src=""

}
document.getElementById("visor").onclick=(e)=>{

if(e.target.id==="visor"){

document.getElementById("visor").style.display="none"
document.getElementById("frame").src=""

}

}
</script>

</body>

</html>
